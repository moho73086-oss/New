<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مفتاحك الخاص</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #040810;
    --surface: #080f1e;
    --border: #0d2444;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --accent3: #10b981;
    --danger: #ef4444;
    --warn: #f59e0b;
    --text: #e2e8f0;
    --muted: #4a6080;
    --glow: rgba(0,212,255,0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Animated starfield */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--dur, 4s) infinite var(--delay, 0s);
    opacity: 0;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(1); }
    50% { opacity: var(--brightness, 0.6); transform: scale(1.5); }
  }

  /* Radial glow background */
  .bg-glow {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background:
      radial-gradient(ellipse 60% 50% at 50% 0%, rgba(0,212,255,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 80% 80%, rgba(124,58,237,0.06) 0%, transparent 60%);
  }

  /* Grid */
  .bg-grid {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.025) 1px, transparent 1px);
    background-size: 50px 50px;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 520px;
    padding: 24px;
    animation: fadeInUp 0.9s cubic-bezier(.16,1,.3,1) both;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(40px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Top badge */
  .top-badge {
    text-align: center;
    margin-bottom: 28px;
    animation: fadeInUp 0.9s 0.1s cubic-bezier(.16,1,.3,1) both;
  }

  .brand-logo {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(0,212,255,0.06);
    border: 1px solid rgba(0,212,255,0.2);
    border-radius: 100px;
    padding: 8px 20px;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .brand-logo .dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--accent);
    animation: blink 2s infinite;
  }

  @keyframes blink {
    0%,100%{opacity:1;} 50%{opacity:0.3;}
  }

  /* Main card */
  .card {
    background: linear-gradient(135deg, var(--surface) 0%, #0c1628 100%);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 40px 36px;
    position: relative;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(0,212,255,0.04),
      0 30px 80px rgba(0,0,0,0.6),
      0 0 60px rgba(0,212,255,0.04) inset;
    animation: fadeInUp 0.9s 0.2s cubic-bezier(.16,1,.3,1) both;
  }

  /* Card top accent line */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 10%; right: 10%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
    opacity: 0.6;
  }

  /* Corner decorations */
  .card::after {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 160px; height: 160px;
    background: radial-gradient(circle, rgba(0,212,255,0.06), transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }

  .greeting {
    text-align: center;
    margin-bottom: 32px;
    animation: fadeInUp 0.9s 0.3s cubic-bezier(.16,1,.3,1) both;
  }

  .greeting-icon {
    font-size: 3rem;
    display: block;
    margin-bottom: 12px;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);}
  }

  .greeting h1 {
    font-size: 1.5rem;
    font-weight: 900;
    color: var(--text);
    margin-bottom: 6px;
  }

  .greeting h1 span {
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .greeting p {
    color: var(--muted);
    font-size: 0.9rem;
    line-height: 1.6;
  }

  /* Divider */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin: 24px 0;
  }

  /* Key section */
  .key-section {
    animation: fadeInUp 0.9s 0.4s cubic-bezier(.16,1,.3,1) both;
  }

  .section-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .key-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 22px;
    position: relative;
    transition: all 0.3s;
    cursor: pointer;
    overflow: hidden;
  }

  .key-box::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0,212,255,0.03), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .key-box:hover { border-color: rgba(0,212,255,0.4); box-shadow: 0 0 20px rgba(0,212,255,0.08); }
  .key-box:hover::before { opacity: 1; }

  .key-value {
    font-family: 'Courier Prime', monospace;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
    word-break: break-all;
    text-shadow: 0 0 20px rgba(0,212,255,0.4);
    display: block;
    margin-bottom: 10px;
    direction: ltr;
    text-align: center;
  }

  .copy-hint {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-size: 0.75rem;
    color: var(--muted);
  }

  .copy-hint svg { width: 13px; height: 13px; }

  /* Copy success */
  .key-box.copied { border-color: rgba(16,185,129,0.5); }
  .key-box.copied .key-value { color: var(--accent3); text-shadow: 0 0 20px rgba(16,185,129,0.4); }
  .key-box.copied .copy-hint { color: var(--accent3); }

  /* Expiry section */
  .expiry-section {
    margin-top: 20px;
    animation: fadeInUp 0.9s 0.5s cubic-bezier(.16,1,.3,1) both;
  }

  .expiry-card {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 18px;
  }

  .expiry-icon {
    width: 42px; height: 42px;
    background: rgba(245,158,11,0.1);
    border: 1px solid rgba(245,158,11,0.25);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .expiry-info { flex: 1; }
  .expiry-label { font-size: 0.72rem; color: var(--muted); font-weight: 600; letter-spacing: 0.5px; }
  .expiry-value { font-size: 1.05rem; font-weight: 700; color: var(--warn); margin-top: 2px; }

  .expiry-badge {
    background: rgba(245,158,11,0.1);
    border: 1px solid rgba(245,158,11,0.25);
    color: var(--warn);
    font-size: 0.7rem;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 100px;
    flex-shrink: 0;
  }

  .expiry-badge.expired {
    background: rgba(239,68,68,0.1);
    border-color: rgba(239,68,68,0.25);
    color: var(--danger);
  }

  /* Copy button */
  .copy-btn {
    width: 100%;
    margin-top: 24px;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), #0099cc);
    color: #000;
    border: none;
    border-radius: 14px;
    font-family: 'Cairo', sans-serif;
    font-size: 1rem;
    font-weight: 900;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: all 0.25s;
    letter-spacing: 0.5px;
    animation: fadeInUp 0.9s 0.6s cubic-bezier(.16,1,.3,1) both;
    position: relative;
    overflow: hidden;
  }

  .copy-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .copy-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,212,255,0.35); }
  .copy-btn:hover::after { opacity: 1; }
  .copy-btn:active { transform: translateY(0); }

  .copy-btn.done {
    background: linear-gradient(135deg, var(--accent3), #0d9669);
    box-shadow: 0 10px 30px rgba(16,185,129,0.3);
  }

  /* Error state */
  .error-card {
    text-align: center;
    padding: 20px 0;
  }

  .error-icon { font-size: 3rem; display: block; margin-bottom: 16px; }
  .error-title { font-size: 1.3rem; font-weight: 900; color: var(--danger); margin-bottom: 8px; }
  .error-desc { color: var(--muted); font-size: 0.9rem; line-height: 1.7; }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 24px;
    font-size: 0.75rem;
    color: var(--muted);
    animation: fadeInUp 0.9s 0.7s cubic-bezier(.16,1,.3,1) both;
  }

  .footer span { color: var(--accent); font-weight: 700; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--accent3);
    color: #000;
    padding: 12px 28px;
    border-radius: 100px;
    font-weight: 700;
    font-size: 0.9rem;
    transition: transform 0.4s cubic-bezier(.16,1,.3,1);
    z-index: 100;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 8px 30px rgba(16,185,129,0.4);
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- Background layers -->
<div class="bg-glow"></div>
<div class="bg-grid"></div>
<div class="stars" id="stars"></div>

<div class="wrapper">

  <div class="top-badge">
    <div class="brand-logo">
      <span class="dot"></span>
      KeyFlow
    </div>
  </div>

  <div class="card" id="main-card">
    <!-- Content injected by JS -->
  </div>

  <div class="footer">
    مُرسَل عبر <span>KeyFlow</span> · نظام إدارة التراخيص
  </div>
</div>

<div class="toast" id="toast">✅ تم نسخ المفتاح!</div>

<script>
  // ---- Generate stars ----
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      --dur:${3 + Math.random()*5}s;
      --delay:${Math.random()*6}s;
      --brightness:${0.3 + Math.random()*0.7};
      width:${Math.random()<0.2?3:2}px;
      height:${Math.random()<0.2?3:2}px;
    `;
    starsEl.appendChild(s);
  }

  // ---- Parse URL params ----
  const params = new URLSearchParams(window.location.search);
  const keyVal  = params.get('key')    || params.get('k') || '';
  const expiry  = params.get('expiry') || params.get('exp') || params.get('e') || '';
  const name    = params.get('name')   || params.get('n') || '';
  const type    = params.get('type')   || params.get('t') || '';

  const card = document.getElementById('main-card');

  // ---- Check expiry ----
  function isExpired(dateStr) {
    if (!dateStr) return false;
    const d = new Date(dateStr);
    return !isNaN(d) && d < new Date();
  }

  function daysLeft(dateStr) {
    if (!dateStr) return null;
    const d = new Date(dateStr);
    if (isNaN(d)) return null;
    const diff = Math.ceil((d - new Date()) / 86400000);
    return diff;
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    if (isNaN(d)) return dateStr;
    return d.toLocaleDateString('ar-EG', { year:'numeric', month:'long', day:'numeric' });
  }

  // ---- Render ----
  if (!keyVal) {
    card.innerHTML = `
      <div class="error-card">
        <span class="error-icon">🔍</span>
        <div class="error-title">لم يُعثر على مفتاح</div>
        <div class="error-desc">
          الرابط الذي فتحته لا يحتوي على مفتاح صالح.<br>
          تأكد من الرابط وحاول مجدداً أو تواصل مع المُرسِل.
        </div>
      </div>
    `;
  } else {
    const expired = isExpired(expiry);
    const days = daysLeft(expiry);
    let expiryBadge = '';
    if (expiry) {
      if (expired) {
        expiryBadge = `<span class="expiry-badge expired">منتهي</span>`;
      } else if (days !== null && days <= 7) {
        expiryBadge = `<span class="expiry-badge">⚠ ${days} أيام</span>`;
      } else if (days !== null) {
        expiryBadge = `<span class="expiry-badge">✓ ${days} يوم متبقي</span>`;
      }
    }

    const typeLabels = { monthly:'شهري', yearly:'سنوي', lifetime:'مدى الحياة', trial:'تجريبي' };
    const typeDisplay = typeLabels[type] || type;

    card.innerHTML = `
      <div class="greeting">
        <span class="greeting-icon">🎉</span>
        <h1>${name ? `مرحباً، <span>${name}</span>` : `مرحباً بك 👋`}</h1>
        <p>هذا مفتاحك المُخصَّص لك${typeDisplay ? ` (${typeDisplay})` : ''}.<br>انسخه واحتفظ به في مكان آمن.</p>
      </div>

      <div class="divider"></div>

      <div class="key-section">
        <div class="section-label">🔑 المفتاح</div>
        <div class="key-box" id="key-box" onclick="copyKey()">
          <span class="key-value" id="key-display">${escapeHtml(keyVal)}</span>
          <div class="copy-hint">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            اضغط لنسخ المفتاح
          </div>
        </div>
      </div>

      ${expiry ? `
      <div class="expiry-section">
        <div class="section-label">📅 تاريخ الانتهاء</div>
        <div class="expiry-card">
          <div class="expiry-icon">📅</div>
          <div class="expiry-info">
            <div class="expiry-label">صالح حتى</div>
            <div class="expiry-value ${expired ? 'style="color:var(--danger)"' : ''}">${formatDate(expiry)}</div>
          </div>
          ${expiryBadge}
        </div>
      </div>
      ` : ''}

      <button class="copy-btn" id="copy-btn" onclick="copyKey()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        نسخ المفتاح
      </button>
    `;
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function copyKey() {
    if (!keyVal) return;
    navigator.clipboard.writeText(keyVal).then(() => {
      const box = document.getElementById('key-box');
      const btn = document.getElementById('copy-btn');
      if (box) box.classList.add('copied');
      if (btn) { btn.classList.add('done'); btn.innerHTML = '✅ تم النسخ!'; }
      showToast();
      setTimeout(() => {
        if (box) box.classList.remove('copied');
        if (btn) {
          btn.classList.remove('done');
          btn.innerHTML = `
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            نسخ المفتاح`;
        }
      }, 2500);
    }).catch(() => {
      // Fallback for older browsers
      const ta = document.createElement('textarea');
      ta.value = keyVal;
      ta.style.cssText = 'position:fixed;opacity:0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast();
    });
  }

  function showToast() {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
